<!DOCTYPE html>
<html>
<head>
    <title>Predictify AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
   /* ================= BACKGROUND FIX ================= */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    z-index: -1;              /* Behind everything */
    pointer-events: none;     /* 🔥 VERY IMPORTANT (fix click issue) */

    background: radial-gradient(circle at 20% 30%, #1a0033, #000000);
}
h1 {
    color: #fff;
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #8b5cf6, 0 0 20px #7c3aed;
}

/* ================= BODY ================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
}

/* ================= CONTAINER ================= */
.container {
    position: relative;
    margin: 120px auto;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    z-index: 10;
    width: 350px;

    box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
}

/* ================= BUTTONS ================= */
.buttons {
    display: flex;
    gap: 10px;
}

.buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #7c3aed, #00f2fe);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.buttons button:hover {
    transform: scale(1.05);
}

/* ================= FILE INPUT ================= */
input[type="file"] {
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
}

/* 🔥 Fix invisible text */
input[type="file"]::file-selector-button {
    background: #7c3aed;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    top: 0;
    left: 10;
    width: 100%;

    display: flex;
    justify-content: flex-end;
    gap: 15px;

    padding: 12px 20px;
    z-index: 1000;

    background: rgba(0, 0, 0, 0.5); /* 🔥 Added for visibility */
    backdrop-filter: blur(10px);
}

/* Navbar links */
.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* ================= FIX CONTENT OVERLAP ================= */
body {
    margin-top: 60px;  /* Prevent navbar overlap */
}
    </style>
</head>

<body>
    <h1>Predictify AI</h1>
    <!-- AI PARTICLES -->
<div class="ai-bg">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- BACKGROUND -->
<div class="background">
    <div class="icon">💼</div>
    <div class="icon">👤</div>
    <div class="icon">🤖</div>
    <div class="icon">📊</div>
    <div class="icon">💡</div>
    <div class="icon">🧠</div>
    <div class="icon">⚡</div>
    <div class="icon">🔮</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <span class="user">👤 {{ username }}</span>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="container">
    <h2>📂 Upload Customer CSV File</h2>

    <!-- ✅ FORM START -->
    <form method="post" enctype="multipart/form-data">

        <input type="file" name="file" accept=".csv" required>
        <br><br>

        <div class="buttons">
          <button formaction="/upload">AI Prediction</button>
        <button formaction="/summary">Quick Summary</button>
        </div>
        <div id="loader" style="display:none;">
    <p style="color:#a855f7;">⚡ AI Processing...</p>
</div>

<script>
document.querySelector("form").onsubmit = function() {
    document.getElementById("loader").style.display = "block";
};
</script>

    </form>
    <!-- ✅ FORM END -->

</div>

</body>
</html>
